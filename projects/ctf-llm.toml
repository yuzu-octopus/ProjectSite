[[sections.rows]]
cells = ["Qwen 3.5 9B", "~9B", "8", "32", "~12GB", "Comfortable"]

[[sections.rows]]
cells = ["Qwen 3.5 4B", "~4B", "8", "16", "~8GB", "Comfortable"]

[[sections]]
