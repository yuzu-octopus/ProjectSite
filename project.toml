[project]
name = "ProjectSite"
tagline = "Static site generator for GitHub Pages"
subtitle = "Generates self-contained Dracula dark + Alucard light themed HTML project pages from TOML data plus a Jinja2 template. Batch-generates all projects from one command."
description = "Static site generator for GitHub project pages"
github_url = "https://github.com/yuzu-octopus/ProjectSite"
page_url = "https://yuzu-octopus.github.io/ProjectSite/"
quickstart_url = "#usage"
logo_svg = """<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><rect width="64" height="64" rx="14" fill="var(--panel)"/><rect x="14" y="16" width="36" height="32" rx="4" fill="none" stroke="var(--green)" stroke-width="2.5"/><path d="M24 26h16" stroke="var(--purple)" stroke-width="2" stroke-linecap="round"/><path d="M24 32h12" stroke="var(--muted)" stroke-width="2" stroke-linecap="round"/><path d="M24 38h8" stroke="var(--muted)" stroke-width="2" stroke-linecap="round"/><circle cx="48" cy="16" r="9" fill="var(--purple)"/><path d="M45 16h6M48 13v6" stroke="var(--bg)" stroke-width="2" stroke-linecap="round"/></svg>"""
favicon_dark = """<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='#44475a'/><circle cx='16' cy='16' r='9' fill='#bd93f9'/><path d='M13 16h6M16 13v6' stroke='#282a36' stroke-width='2' stroke-linecap='round'/></svg>"""
favicon_light = """<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='#E2DECA'/><circle cx='16' cy='16' r='9' fill='#644AC9'/><path d='M13 16h6M16 13v6' stroke='#1F1F1F' stroke-width='2' stroke-linecap='round'/></svg>"""

[brand]
tagline = "TOML · Jinja2 · Python"

[[sections]]
id = "features"
type = "features"
title = "Features"
icon = "grid"

[[sections.items]]
title = "TOML-Driven"
body = "Write project data in clean TOML. No HTML editing needed. Each project gets one .toml file with all its content."

[[sections.items]]
title = "Jinja2 Template"
body = "Single template with Dracula theme, JetBrains Mono font, sidebar navigation, and responsive layout. Update the look of all projects by editing one file."

[[sections.items]]
title = "Batch Mode"
body = "Generate all project pages at once with --batch. Each .toml becomes docs/<name>/index.html — ready for GitHub Pages."

[[sections.items]]
title = "Per-Project CI"
body = "Each project repo runs the generator in its own GitHub Actions workflow. The .toml is the single source of truth."

[[sections]]
id = "ci"
type = "code_block"
title = "CI Workflow"
icon = "gear"
code = """
name: Deploy project page

permissions:
  contents: write

on:
  push:
    branches: [main]
    paths:
      - "project.toml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Checkout generator
        uses: actions/checkout@v4
        with:
          repository: yuzu-octopus/ProjectSite
          path: generator
      - name: Generate page
        run: |
          pip install jinja2
          python generator/genpage.py --input project.toml --output docs/index.html
      - name: Commit generated page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "ci: regenerate project page [skip ci]"
          git push https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}
"""

[[sections]]
id = "usage"
type = "code_block"
title = "Usage"
icon = "play"
code = """
# Single project
uv run python genpage.py --input project.toml --output docs/index.html

# Batch mode — all .toml files in a directory
uv run python genpage.py --input projects/ --output docs/ --batch"""

